<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Files - MyCloud Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><i class="fas fa-cloud"></i> MyCloud</div>
        <div class="nav-links">
            <a href="/my_files" class="active">Files</a>
            <a href="/my_files/photos">Gallery</a>
        </div>
        <div class="menu-actions">
            <a href="#" onclick="logout()" class="action-btn logout-link" title="Logout"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </nav>

    <div class="app-container" style="margin-top: 30px;">
        
        <div class="upload-zone" id="upload-zone">
            <i class="fas fa-cloud-upload-alt upload-icon"></i>
            <div class="upload-content">
                <h3>Drag & Drop files here</h3>
                <p>or <span>browse</span> to upload</p>
            </div>
            <input type="file" id="file-input" hidden multiple>
        </div>

        <div class="progress-wrapper" id="upload-progress-container" style="display: none;">
            <div class="progress-info">
                <span id="filename-display">Uploading...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="data-card" id="file-list">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i></div>
        </div>
    </div>

    <div id="viewer">
        <i class="fas fa-times close-viewer" onclick="closeViewer()"></i>
        <img id="viewer-img" src="">
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
