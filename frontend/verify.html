<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Device - MyCloud</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Unrecognized Device</h2>
            <p class="subtitle">Please verify this device to continue.</p>
            <form id="verify-form">
                <div class="input-group">
                    <label>Verification Code</label>
                    <input type="text" id="verify-code" placeholder="Enter 6-digit code" required>
                </div>
                <button type="submit" class="btn">Verify</button>
            </form>
        </div>
    </div>
</body>
</html>
