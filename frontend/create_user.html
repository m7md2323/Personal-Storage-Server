<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Vault - MyCloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>New Vault</h2>
            <p class="subtitle" style="margin-bottom: 32px;">Set up your secure storage</p>
            
            <form id="create-user-form">
                <div class="input-group">
                    <label for="new-username">Vault Username</label>
                    <input type="text" id="new-username" required autofocus>
                </div>
                <div class="input-group">
                    <label for="new-password">Master Password</label>
                    <input type="password" id="new-password" required>
                </div>
                
                <button type="submit" class="btn">Create</button>
                <a href="/" class="btn btn-outline" style="text-decoration: none; margin-top: 12px; display: block;">Cancel</a>
            </form>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
