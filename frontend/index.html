<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Storage</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to Your Cloud</h1>
        
        <div id="user-selection" class="card">
            <h3>Who are you?</h3>
            <div id="user-list">
                <p class="loading">Scanning database...</p>
            </div>
        </div>

        <div class="divider">OR</div>

        <div id="create-account" class="card">
            <h3>Create New Profile</h3>
            <input type="text" id="new-username" placeholder="Choose a Username">
            <button onclick="requestAccess()" class="btn-primary">Get Verification Code</button>
            <p class="hint">A 10-digit code will appear on the laptop terminal.</p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
